name: address_verify
description: On-device proof-of-address pre-screening for Flutter. Runs OCR and fuses fuzzy address, name, and GPS signals into a confidence score; not a verification authority.
version: 0.1.1
repository: https://github.com/enypeter/flutter_address_verify
issue_tracker: https://github.com/enypeter/flutter_address_verify/issues

topics:
  - ocr
  - address
  - documents
  - pre-screening
  - compliance

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  crypto: ^3.0.0
  file_picker: ^11.0.0
  flutter:
    sdk: flutter
  geocoding: ^4.0.0
  geolocator: ^14.0.0
  google_mlkit_text_recognition: ^0.15.0
  image: ^4.0.0
  pdfx: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  very_good_analysis: ^6.0.0

flutter:
